<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OK Traffic Control — EmployeeHub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--navy:#1e3a5f;--blue:#2c5282;--light-blue:#4a90e2;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--bg:#f0f4f8;--white:#fff;--border:#e2e8f0;--text:#1a1a1a;--muted:#64748b;--light:#f8fafc;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:linear-gradient(160deg,var(--navy),var(--blue));}
.login-logo{width:80px;height:80px;background:white;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:1rem;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.login-title{color:white;font-size:1.5rem;font-weight:700;margin-bottom:0.25rem;}
.login-sub{color:rgba(255,255,255,0.7);font-size:0.875rem;margin-bottom:2rem;}
.login-card{background:white;border-radius:16px;padding:2rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:1.5rem;gap:4px;}
.login-tab{flex:1;padding:0.6rem;border:none;background:none;border-radius:8px;font-size:0.875rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.login-tab.active{background:white;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:0.78rem;font-weight:700;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.7rem;border:2px solid var(--border);border-radius:10px;font-size:0.9rem;transition:border-color 0.2s;background:white;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
.btn{width:100%;padding:0.8rem;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;}
.btn-primary{background:var(--blue);color:white;}
.btn-primary:hover{background:var(--navy);}
.btn-sm{width:auto;padding:0.4rem 0.85rem;font-size:0.78rem;border-radius:8px;}
.btn-success{background:var(--green);color:white;}
.btn-danger{background:var(--red);color:white;}
.btn-amber{background:var(--amber);color:white;}
.btn-secondary{background:var(--border);color:var(--text);}

#appShell{display:none;flex-direction:column;min-height:100vh;}
.top-bar{background:linear-gradient(135deg,var(--navy),var(--blue));color:white;padding:0.8rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.top-bar-left{display:flex;align-items:center;gap:0.75rem;}
.top-bar-logo{width:36px;height:36px;background:white;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.top-bar-title{font-size:0.95rem;font-weight:700;line-height:1.2;}
.top-bar-sub{font-size:0.68rem;opacity:0.75;}
.top-bar-right{display:flex;align-items:center;gap:0.6rem;}
.role-pill{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);padding:0.25rem 0.65rem;border-radius:20px;font-size:0.72rem;font-weight:700;}
.notif-btn{background:none;border:none;color:white;font-size:1.1rem;cursor:pointer;position:relative;}
.notif-dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1px solid var(--navy);}

.main-content{flex:1;padding:1rem;max-width:680px;margin:0 auto;width:100%;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.4rem 0.1rem;border:none;background:none;cursor:pointer;color:var(--muted);transition:color 0.2s;position:relative;}
.nav-item.active{color:var(--blue);}
.nav-icon{font-size:1.1rem;line-height:1;}
.nav-label{font-size:0.58rem;font-weight:600;margin-top:0.15rem;}
.nav-badge{position:absolute;top:4px;right:calc(50% - 14px);background:var(--red);color:white;font-size:0.58rem;font-weight:700;border-radius:10px;padding:0.1rem 0.3rem;}

.card{background:white;border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,0.07);border:1px solid var(--border);}
.card-title{font-size:0.95rem;font-weight:700;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;margin-bottom:1rem;}
.stat-box{background:var(--light);border-radius:12px;padding:0.875rem;text-align:center;}
.stat-num{font-size:1.6rem;font-weight:800;color:var(--blue);}
.stat-lbl{font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:0.2rem;}

.clock-card{background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:16px;padding:1.5rem;color:white;text-align:center;margin-bottom:1rem;}
.clock-time{font-size:2.25rem;font-weight:800;letter-spacing:-1px;}
.clock-date{font-size:0.82rem;opacity:0.8;margin-bottom:1rem;}
.clock-status{display:inline-block;padding:0.3rem 0.875rem;border-radius:20px;font-size:0.78rem;font-weight:700;margin-bottom:1rem;}
.clocked-in{background:rgba(16,185,129,0.3);border:1px solid rgba(16,185,129,0.6);}
.clocked-out{background:rgba(239,68,68,0.3);border:1px solid rgba(239,68,68,0.6);}
.clock-btn{padding:0.875rem;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;width:100%;}
.btn-clock-in{background:var(--green);color:white;}
.btn-clock-out{background:var(--red);color:white;}
.gps-indicator{font-size:0.72rem;opacity:0.8;margin-top:0.65rem;display:flex;align-items:center;justify-content:center;gap:0.4rem;}
.gps-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.3);}}

.badge{display:inline-flex;align-items:center;padding:0.22rem 0.6rem;border-radius:12px;font-size:0.7rem;font-weight:700;}
.badge-green{background:#d1fae5;color:#065f46;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-amber{background:#fef3c7;color:#92400e;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.badge-gray{background:#f1f5f9;color:#475569;}

.list-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 0;border-bottom:1px solid var(--border);}
.list-item:last-child{border-bottom:none;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--light-blue));color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.82rem;flex-shrink:0;}
.avatar-sm{width:30px;height:30px;font-size:0.72rem;}
.list-info{flex:1;min-width:0;}
.list-name{font-weight:600;font-size:0.875rem;}
.list-sub{font-size:0.72rem;color:var(--muted);margin-top:0.1rem;}
.list-right{text-align:right;flex-shrink:0;}

.mini-map{background:#e8f4f8;border:2px solid #93c5fd;border-radius:12px;height:200px;position:relative;overflow:hidden;margin-bottom:0.75rem;}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(100,149,237,0.12) 1px,transparent 1px),linear-gradient(90deg,rgba(100,149,237,0.12) 1px,transparent 1px);background-size:28px 28px;}
.trail-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--blue);border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);transform:translate(-50%,-50%);}
.trail-dot.current{background:var(--green);width:14px;height:14px;animation:pulse 2s infinite;}
.trail-line{position:absolute;background:rgba(44,82,130,0.4);height:2px;transform-origin:left center;}
.map-overlay{position:absolute;top:8px;left:8px;background:rgba(255,255,255,0.92);border-radius:8px;padding:0.3rem 0.55rem;font-size:0.7rem;font-weight:700;color:var(--navy);}

.chat-item{display:flex;align-items:center;gap:0.75rem;padding:0.875rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.chat-item:hover{background:#eff6ff;}
.chat-back{display:flex;align-items:center;gap:0.5rem;padding:0.65rem 0;font-weight:700;color:var(--blue);cursor:pointer;border:none;background:none;font-size:0.875rem;}
.msg-bubble{max-width:78%;padding:0.55rem 0.825rem;border-radius:14px;font-size:0.85rem;line-height:1.5;}
.msg-out{background:var(--blue);color:white;align-self:flex-end;border-bottom-right-radius:4px;}
.msg-in{background:#f1f5f9;color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.msg-time{font-size:0.62rem;opacity:0.6;margin-top:0.2rem;}
.msg-input-row{display:flex;gap:0.5rem;padding:0.65rem 0 0.4rem;}
.msg-input-row input{flex:1;padding:0.65rem 0.875rem;border:2px solid var(--border);border-radius:24px;font-size:0.875rem;}
.msg-input-row input:focus{outline:none;border-color:var(--blue);}
.msg-send{width:40px;height:40px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.ann{border-radius:12px;padding:0.875rem 1rem;margin-bottom:0.75rem;border-left:4px solid;}
.ann-info{background:#eff6ff;border-color:#3b82f6;}
.ann-warn{background:#fffbeb;border-color:var(--amber);}
.ann-success{background:#f0fdf4;border-color:var(--green);}
.ann-title{font-weight:700;font-size:0.875rem;}
.ann-body{font-size:0.8rem;color:#475569;margin-top:0.2rem;line-height:1.5;}
.ann-meta{font-size:0.7rem;color:#94a3b8;margin-top:0.35rem;}

.cert-item{padding:0.75rem 0;border-bottom:1px solid var(--border);}
.cert-item:last-child{border:none;}
.cert-bar-bg{height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-top:0.4rem;}
.cert-bar-fill{height:100%;border-radius:3px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 1.1rem;}
.modal-title{font-size:1.15rem;font-weight:700;margin-bottom:1.1rem;}
.modal-actions{display:flex;gap:0.75rem;margin-top:1.1rem;}
.modal-actions .btn{flex:1;}

.alert-bar{background:#fffbeb;border:1px solid var(--amber);border-radius:10px;padding:0.65rem 0.875rem;font-size:0.8rem;color:#92400e;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.scroll-table{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.8rem;}
th{background:#f8fafc;padding:0.65rem 0.55rem;text-align:left;font-weight:700;color:var(--muted);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.4px;border-bottom:2px solid var(--border);white-space:nowrap;}
td{padding:0.65rem 0.55rem;border-bottom:1px solid #f8fafc;vertical-align:middle;}
.pb-nav{padding-bottom:75px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-logo">🚧</div>
  <div class="login-title">OK Traffic Control</div>
  <div class="login-sub">EmployeeHub Pro</div>
  <div class="login-card">
    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In →</button>
    <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);">
      <p style="text-align:center;font-size:0.72rem;color:var(--muted);margin-bottom:0.75rem;">Demo accounts</p>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn btn-secondary" style="font-size:0.78rem;padding:0.5rem;" onclick="fillLogin('marcus@oktc.com','demo123')">👷 Employee</button>
        <button class="btn btn-secondary" style="font-size:0.78rem;padding:0.5rem;" onclick="fillLogin('pamela@oktc.com','demo123')">🏢 Admin</button>
      </div>
    </div>
  </div>
</div>

<div id="appShell">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">🚧</div>
      <div>
        <div class="top-bar-title">OK Traffic Control</div>
        <div class="top-bar-sub" id="topSub">EmployeeHub Pro</div>
      </div>
    </div>
    <div class="top-bar-right">
      <div class="role-pill" id="rolePill">👷 Employee</div>
      <button class="notif-btn" onclick="showSection('alerts')">🔔<span class="notif-dot"></span></button>
      <button class="notif-btn" onclick="signOut()" title="Sign out" style="font-size:0.75rem;font-weight:700;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:0.3rem 0.6rem;color:white;">Sign Out</button>
    </div>
  </div>
  <div class="main-content pb-nav" id="main"></div>
  <nav class="bottom-nav" id="nav"></nav>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ── DEMO DATA ─────────────────────────────────────────────────
let role = 'employee';
let isClockedIn = false;
let clockInTime = null;
let clockTimer = null;
let gpsTrail = [];
let gpsInterval = null;
let activeChat = null;

const employees = [
  {id:'E1',first:'Pamela',last:'Hardy',email:'pamela@oktc.com',dept:'Office',pos:'Office Manager',rate:35},
  {id:'E2',first:'Marcus',last:'Webb',email:'marcus@oktc.com',dept:'Field',pos:'Traffic Control Supervisor',rate:28},
  {id:'E3',first:'Destiny',last:'Cruz',email:'destiny@oktc.com',dept:'Field',pos:'Lead Flagger',rate:24},
  {id:'E4',first:'Tyler',last:'Brooks',email:'tyler@oktc.com',dept:'Field',pos:'Flagger',rate:22},
  {id:'E5',first:'Aisha',last:'Johnson',email:'aisha@oktc.com',dept:'Field',pos:'Flagger',rate:22},
];

const timeEntries = [
  {id:'T1',empId:'E2',date:'2026-03-05',clockIn:'06:45',clockOut:'15:15',hrs:8.5,status:'Approved'},
  {id:'T2',empId:'E3',date:'2026-03-05',clockIn:'07:00',clockOut:'15:00',hrs:8.0,status:'Approved'},
  {id:'T3',empId:'E4',date:'2026-03-05',clockIn:'07:00',clockOut:'14:30',hrs:7.5,status:'Pending'},
  {id:'T4',empId:'E5',date:'2026-03-05',clockIn:'07:15',clockOut:'15:15',hrs:8.0,status:'Pending'},
  {id:'T5',empId:'E2',date:'2026-03-04',clockIn:'06:45',clockOut:'15:00',hrs:8.25,status:'Approved'},
  {id:'T6',empId:'E3',date:'2026-03-04',clockIn:'07:00',clockOut:'16:00',hrs:9.0,status:'Approved'},
];

const certs = [
  {id:'C1',empId:'E2',name:'Traffic Control Supervisor (TCS)',body:'WSDOT',issued:'2023-03-10',expiry:'2026-03-15'},
  {id:'C2',empId:'E3',name:'Flagger Certification',body:'WSDOT',issued:'2024-01-15',expiry:'2026-03-20'},
  {id:'C3',empId:'E4',name:'Flagger Certification',body:'WSDOT',issued:'2024-06-01',expiry:'2026-06-01'},
  {id:'C4',empId:'E5',name:'Flagger Certification',body:'WSDOT',issued:'2023-09-10',expiry:'2026-09-10'},
  {id:'C5',empId:'E2',name:'First Aid / CPR',body:'Red Cross',issued:'2024-03-01',expiry:'2026-03-01'},
  {id:'C6',empId:'E3',name:'First Aid / CPR',body:'Red Cross',issued:'2024-06-01',expiry:'2026-06-01'},
];

const announcements = [
  {id:'A1',title:'Safety Briefing — Friday 7AM',body:'Mandatory safety briefing before the Hwy 512 job. All field staff must attend.',type:'warn',author:'Pamela Hardy',date:'2026-03-04'},
  {id:'A2',title:'Cert Renewals Due Soon',body:'TCS and Flagger certs expiring this month — renew ASAP and send paperwork to office.',type:'warn',author:'Office',date:'2026-03-03'},
  {id:'A3',title:'Q1 Bonuses Paid 🎉',body:'Great quarter everyone — Q1 bonuses have been issued with this week\'s payroll.',type:'success',author:'Management',date:'2026-03-01'},
];

const messages = {
  E2:[
    {from:'office',text:'Marcus, your TCS cert expires March 15 — please renew ASAP.',time:'8:02 AM'},
    {from:'E2',text:'On it, will get the renewal card to you by Friday.',time:'8:20 AM'},
  ],
  E3:[
    {from:'E3',text:'Where are we setting up on Hwy 512 tomorrow?',time:'Yesterday'},
    {from:'office',text:'Mile marker 14, same as last time. Be there by 6:45.',time:'Yesterday'},
  ],
  E4:[{from:'E4',text:'Can I get Friday off?',time:'Monday'}],
  E5:[{from:'office',text:'Aisha, make sure your timesheet is submitted by EOD.',time:'Today'}],
};

// ── UTILS ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmtTime = d => d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const fmtDate = d => d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
const daysUntil = d => Math.ceil((new Date(d)-new Date())/86400000);
const initials = e => (e.first[0]+e.last[0]).toUpperCase();
const fullName = e => e.first+' '+e.last;
const getEmp = id => employees.find(e=>e.id===id);

function certBadge(days){
  if(days<0)  return{cls:'badge-red',  label:'Expired'};
  if(days<=14) return{cls:'badge-red',  label:days+'d'};
  if(days<=60) return{cls:'badge-amber',label:days+'d'};
  return{cls:'badge-green',label:'Valid'};
}
function certBarColor(days){
  if(days<=0) return'#ef4444';
  if(days<=30)return'#ef4444';
  if(days<=60)return'#f59e0b';
  return'#10b981';
}

// ── LOGIN ─────────────────────────────────────────────────────
function fillLogin(email, pass){
  $('loginEmail').value = email;
  $('loginPass').value  = pass;
}

function doLogin(){
  const email = $('loginEmail').value.trim();
  const pass  = $('loginPass').value.trim();
  if(!email||!pass){alert('Enter email and password.');return;}
  // Determine role by email
  const adminEmails = ['pamela@oktc.com','jessica@oktc.com'];
  role = adminEmails.includes(email.toLowerCase()) ? 'admin' : 'employee';
  $('loginScreen').style.display='none';
  $('appShell').style.display='flex';
  initApp();
}

function signOut(){
  stopGPS();
  if(clockTimer)clearInterval(clockTimer);
  clockTimer=null;
  isClockedIn=false; clockInTime=null; gpsTrail=[]; activeChat=null;
  $('loginEmail').value=''; $('loginPass').value='';
  $('appShell').style.display='none';
  $('loginScreen').style.display='flex';
}

// ── INIT ──────────────────────────────────────────────────────
function initApp(){
  $('rolePill').textContent = role==='admin'?'🏢 Admin':'👷 Employee';
  $('topSub').textContent   = role==='admin'?'Admin Dashboard':'Field App';
  role==='admin'?buildAdminNav():buildEmpNav();
  showSection('home');
}

function buildEmpNav(){
  $('nav').innerHTML=`
    <button class="nav-item" data-s="home"    onclick="showSection('home')">   <span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item" data-s="gps"     onclick="showSection('gps')">    <span class="nav-icon">📍</span><span class="nav-label">My Trail</span></button>
    <button class="nav-item" data-s="mycerts" onclick="showSection('mycerts')"><span class="nav-icon">📋</span><span class="nav-label">My Certs</span></button>
    <button class="nav-item" data-s="chat"    onclick="showSection('chat')">   <span class="nav-icon">💬</span><span class="nav-label">Chat</span><span class="nav-badge">1</span></button>
    <button class="nav-item" data-s="alerts"  onclick="showSection('alerts')"> <span class="nav-icon">🔔</span><span class="nav-label">Alerts</span><span class="nav-badge">2</span></button>`;
}
function buildAdminNav(){
  $('nav').innerHTML=`
    <button class="nav-item" data-s="home"       onclick="showSection('home')">      <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></button>

function startClock(){
  if(clockTimer)clearInterval(clockTimer);
  clockTimer=setInterval(()=>{const el=$('clk');if(el)el.textContent=fmtTime(new Date());},1000);
}

function toggleClock(){
  if(!isClockedIn){
    isClockedIn=true; clockInTime=new Date(); gpsTrail=[];
    startGPS();
  } else {
    isClockedIn=false;
    const h=((new Date()-clockInTime)/3600000).toFixed(2);
    stopGPS();
    alert(`⏹ Clocked out.\nHours: ${h}\nGPS pings: ${gpsTrail.length}`);
    clockInTime=null; gpsTrail=[];
  }
  renderEmpHome();
}

function startGPS(){
  const ping=()=>{
    const last=gpsTrail[gpsTrail.length-1]||{lat:47.1532,lng:-122.4783};
    gpsTrail.push({
      time:fmtTime(new Date()),
      lat:(parseFloat(last.lat)+(Math.random()-0.5)*0.003).toFixed(5),
      lng:(parseFloat(last.lng)+(Math.random()-0.5)*0.003).toFixed(5)
    });
  };
  ping();
  gpsInterval=setInterval(ping,10*60*1000);
}
function stopGPS(){if(gpsInterval)clearInterval(gpsInterval);gpsInterval=null;}

function renderChatThread(empId){
  const e=getEmp(empId);
  const thread=messages[empId]||[];
  $('main').innerHTML=`
    <div style="display:flex;flex-direction:column;height:calc(100vh - 155px);">
      <button class="chat-back" onclick="activeChat=null;showSection('chat')">← Back</button>
      <div style="font-weight:700;font-size:0.95rem;margin-bottom:0.65rem;">${e?fullName(e):empId}</div>
      <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0.45rem;padding-bottom:0.5rem;" id="msgArea">
        ${thread.map(m=>{
          const isMe=(role==='admin'&&m.from==='office')||(role==='employee'&&m.from!=='office'&&m.from!==empId);
          return`<div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};">
            <div class="msg-bubble ${isMe?'msg-out':'msg-in'}">${m.text}
              <div class="msg-time">${m.time}</div>
            </div>
          </div>`;
        }).join('')||'<p style="text-align:center;color:var(--muted);font-size:0.82rem;padding:1rem;">No messages yet.</p>'}
      </div>
      <div class="msg-input-row">
        <input type="text" id="chatIn" placeholder="Message…" onkeydown="if(event.key==='Enter')sendMsg('${empId}')">
        <button class="msg-send" onclick="sendMsg('${empId}')">➤</button>
      </div>
    </div>`;
  const area=$('msgArea');
  if(area) area.scrollTop=99999;
}

function sendMsg(empId){
  const input=$('chatIn');
  const txt=input.value.trim();
  if(!txt) return;
  if(!messages[empId]) messages[empId]=[];
  messages[empId].push({from:role==='admin'?'office':'me',text:txt,time:fmtTime(new Date())});
  input.value='';
  renderChatThread(empId);
}

function submitTime(){
  const empId=$('tE').value,date=$('tD').value,ci=$('tI').value,co=$('tO').value;
  if(!empId||!date||!ci||!co){alert('Fill all fields.');return;}
  const [ih,im]=ci.split(':').map(Number),[oh,om]=co.split(':').map(Number);
  const h=((oh*60+om-ih*60-im)/60).toFixed(2);
  timeEntries.push({id:'T'+Date.now(),empId,date,clockIn:ci,clockOut:co,hrs:parseFloat(h),status:'Pending'});
  closeModal(); showSection('timesheets');
}

// ── CSV ───────────────────────────────────────────────────────
function downloadCSV(type){
  let cols=[],rows=[];
  if(type==='timesheet'){
    cols=['Employee ID','Name','Dept','Position','Rate','Date','Clock In','Clock Out','Hours','Gross','Status'];
    rows=timeEntries.map(t=>{const e=getEmp(t.empId)||{};return[e.id,fullName(e),e.dept,e.pos,'$'+e.rate,t.date,t.clockIn,t.clockOut,t.hrs,'$'+(t.hrs*e.rate).toFixed(2),t.status];});
  } else if(type==='gps'){
    cols=['Employee ID','Name','Date','Time','Latitude','Longitude'];
    const trail=genDemoTrail();
    employees.forEach(e=>trail.forEach((p,i)=>rows.push([e.id,fullName(e),'2026-03-05',p.time,p.lat,p.lng])));
  } else if(type==='certs'){
    cols=['Employee ID','Name','Certification','Issuing Body','Issue Date','Expiry Date','Days Left'];
    rows=certs.map(c=>{const e=getEmp(c.empId)||{};const days=daysUntil(c.expiry);return[c.empId,fullName(e),c.name,c.body,c.issued,c.expiry,days<0?'EXPIRED':days];});
  } else {
    cols=['ID','First','Last','Department','Position','Rate','Status'];
    rows=employees.map(e=>[e.id,e.first,e.last,e.dept,e.pos,e.rate,'Active']);
  }
  const csv=[cols.join(','),...rows.map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`oktc_${type}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ── GPS MAP ───────────────────────────────────────────────────
function genDemoTrail(){
  const t=[]; let lat=47.1532,lng=-122.4783;
  for(let i=0;i<8;i++){
    lat+=(Math.sin(i*1.3)*0.003); lng+=(Math.cos(i*1.3)*0.003);
    t.push({time:`0${7+Math.floor(i*10/60)}:${String((i*10)%60).padStart(2,'0')}`,lat:lat.toFixed(5),lng:lng.toFixed(5)});
  }
  return t;
}
function drawTrail(mapId,trail){
  const map=$(mapId); if(!map||trail.length===0)return;
  [...map.querySelectorAll('.trail-dot,.trail-line')].forEach(el=>el.remove());
  const W=map.clientWidth,H=map.clientHeight,pad=22;
  const lats=trail.map(p=>parseFloat(p.lat)),lngs=trail.map(p=>parseFloat(p.lng));
  const minLat=Math.min(...lats),maxLat=Math.max(...lats),minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
  const xy=(lat,lng)=>({x:pad+(lng-minLng)/(maxLng-minLng||0.001)*(W-pad*2),y:H-pad-(lat-minLat)/(maxLat-minLat||0.001)*(H-pad*2)});
  trail.forEach((p,i)=>{
    const{x,y}=xy(parseFloat(p.lat),parseFloat(p.lng));
    if(i<trail.length-1){
      const n=xy(parseFloat(trail[i+1].lat),parseFloat(trail[i+1].lng));
      const dx=n.x-x,dy=n.y-y,len=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)*180/Math.PI;
      const line=document.createElement('div'); line.className='trail-line';
      line.style.cssText=`left:${x}px;top:${y}px;width:${len}px;transform:rotate(${ang}deg);`;
      map.appendChild(line);
    }
    const dot=document.createElement('div');
    dot.className='trail-dot'+(i===trail.length-1?' current':'');
    dot.style.cssText=`left:${x}px;top:${y}px;`; dot.title=p.time;
    map.appendChild(dot);
  });
}
